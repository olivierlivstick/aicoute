# Netlify — SITE VITRINE PUBLIC (modect.com)
# Site Netlify dédié : définir "Base directory" = apps/web dans l'UI Netlify.
# Netlify lit alors ce fichier ; publish est relatif au Base directory.
[build]
  command = "npm run build"
  publish = "dist"          # relatif au Base directory (apps/web) → apps/web/dist

[build.environment]
  NODE_VERSION = "20"

# SPA : toutes les routes inconnues → index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Headers de sécurité (la vitrine n'a pas besoin du micro)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options         = "DENY"
    X-Content-Type-Options  = "nosniff"
    X-XSS-Protection        = "1; mode=block"
    Referrer-Policy         = "strict-origin-when-cross-origin"
    Permissions-Policy      = "camera=(), microphone=(), geolocation=()"

# Cache agressif pour les assets Vite (hash dans le nom de fichier)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
