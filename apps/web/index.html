<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MODECT — Gardez le lien, même à distance</title>
    <meta
      name="description"
      content="MODECT appelle régulièrement vos parents âgés, prend de leurs nouvelles et vous envoie un résumé chaleureux après chaque échange. Une présence pour ceux que vous aimez."
    />
    <!-- Google Fonts — charte MODECT : Fraunces (titres) + Inter (corps) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- Umami analytics — vitrine UNIQUEMENT. On exclut le back-office (app.*)
         et le dev local (localhost / 127.0.0.1) pour ne pas polluer les stats.
         Même critère que isAppHost (App.tsx : hostname.startsWith('app.')). -->
    <script>
      (function () {
        var h = location.hostname;
        if (h.indexOf('app.') === 0 || h === 'localhost' || h === '127.0.0.1') return;
        var s = document.createElement('script');
        s.defer = true;
        s.src = 'https://cloud.umami.is/script.js';
        s.setAttribute('data-website-id', 'e2c08a12-533d-4fc8-8de6-84992d250159');
        document.head.appendChild(s);
      })();
    </script>
  </head>
  <body class="bg-background font-body text-brun-900 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
