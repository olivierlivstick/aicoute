    <!-- Données structurées (JSON-LD) — Organization + WebSite + FAQ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://www.aicoute.fr/#organization",
            "name": "Aicoute",
            "url": "https://www.aicoute.fr/",
            "logo": "https://www.aicoute.fr/logo.png",
            "description": "Compagnon téléphonique qui appelle régulièrement vos proches âgés et vous envoie un résumé après chaque échange.",
            "email": "contact@aicoute.fr",
            "sameAs": ["https://www.linkedin.com/company/aicoute/"],
            "areaServed": "FR"
          },
          {
            "@type": "WebSite",
            "@id": "https://www.aicoute.fr/#website",
            "url": "https://www.aicoute.fr/",
            "name": "Aicoute",
            "inLanguage": "fr-FR",
            "publisher": { "@id": "https://www.aicoute.fr/#organization" }
          },
          {
            "@type": "FAQPage",
            "@id": "https://www.aicoute.fr/#faq",
            "mainEntity": [
              {
                "@type": "Question",
                "name": "Comment Aicoute se souvient-il des conversations précédentes ?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Chaque conversation est résumée puis indexée dans la mémoire dédiée à votre proche : les sujets récurrents, les personnes mentionnées, les événements importants. L'IA peut ainsi reprendre le fil naturellement d'un appel à l'autre."
                }
              },
              {
                "@type": "Question",
                "name": "Sur quel numéro l'appel est-il passé ?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Sur le numéro de ligne fixe ou mobile que vous renseignez lors de la création du profil. Vous pouvez le modifier à tout moment depuis votre espace personnel."
                }
              },
              {
                "@type": "Question",
                "name": "Que se passe-t-il si mon proche dit quelque chose d'inquiétant ?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Tout signal sensible — douleur physique, déprime, chute évoquée, sujet préoccupant — est remonté dans la section « Point d'attention » de votre résumé. Vous pouvez aussi activer une alerte par email en temps réel pour être prévenu·e sans attendre le résumé."
                }
              },
              {
                "@type": "Question",
                "name": "Mon proche peut-il appeler Aicoute lui-même ?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Aicoute appelle votre proche à la fréquence que vous avez définie. Mais, votre proche peut aussi appeler Aicoute de lui-même, lorsqu'il en ressent le besoin — un soir un peu solitaire, une envie de raconter sa journée, un moment sans visite. La présence ne dépendra plus seulement du calendrier : elle sera là aussi quand l'envie vient."
                }
              },
              {
                "@type": "Question",
                "name": "Puis-je suivre plusieurs proches depuis un seul compte ?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Oui. Un même compte peut réunir plusieurs bénéficiaires — vos deux parents, un parent et une tante… Chacun garde son profil, sa fréquence d'appel et son historique, et vous retrouvez tous leurs résumés au même endroit. Vos minutes forment un solde unique, que vous répartissez librement entre vos proches selon les besoins de chacun."
                }
              },
              {
                "@type": "Question",
                "name": "Peut-on tester Aicoute avant de payer ?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Oui. Le premier appel est entièrement offert, sans carte bancaire, pour que vous et votre proche puissiez juger sur pièce avant tout engagement."
                }
              },
              {
                "@type": "Question",
                "name": "Comment fonctionnent les minutes ?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Vous achetez un pack de minutes de conversation — par exemple 100 minutes. À chaque appel, seul le temps réellement passé à échanger avec votre proche est décompté. Une conversation dure en moyenne 7 à 10 minutes, et vous voyez votre solde restant à tout moment dans votre espace personnel."
                }
              },
              {
                "@type": "Question",
                "name": "Pourquoi un tarif à la minute plutôt qu'un abonnement ?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Parce que chaque famille a son rythme : un appel par semaine pour les uns, un rendez-vous quotidien pour les autres. Payer au temps réel de conversation, c'est ne payer que pour la présence dont votre proche a besoin — ni plus, ni moins."
                }
              },
              {
                "@type": "Question",
                "name": "Les appels passés par mon proche consomment-ils des minutes ?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Oui, ils sont décomptés de votre solde comme les appels d'Aicoute — mais des garde-fous évitent toute mauvaise surprise. Par défaut, ces appels sont limités à 10 minutes par conversation et à un appel par jour. Vous pouvez ajuster ces limites, ou les désactiver, à tout moment depuis votre espace personnel."
                }
              },
              {
                "@type": "Question",
                "name": "Et si mon proche ne décroche pas, ou si l'appel est très court ?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Vous ne payez que les conversations qui ont vraiment lieu. Un appel sans réponse, une sonnerie dans le vide ou un échange interrompu au bout de quelques secondes ne consomment aucune minute. Nous ne décomptons que le temps de présence réel."
                }
              },
              {
                "@type": "Question",
                "name": "Mes minutes ont-elles une date d'expiration ?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Vos minutes restent valables 6 mois après l'achat — de quoi tenir votre rythme sereinement, même en cas de pause (vacances, hospitalisation…). Rien ne se déclenche tant qu'il vous reste des minutes."
                }
              },
              {
                "@type": "Question",
                "name": "Que se passe-t-il quand mon pack est presque épuisé ?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Nous vous prévenons par email bien avant la fin, pour que le lien ne s'interrompe jamais à votre insu. Vous pouvez alors racheter un pack en deux clics, ou activer la recharge automatique pour ne plus jamais y penser."
                }
              },
              {
                "@type": "Question",
                "name": "La recharge automatique est-elle obligatoire ?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Non, jamais. C'est une simple option, que vous activez si vous le souhaitez et désactivez quand vous voulez, sans justificatif. Elle existe uniquement pour celles et ceux qui veulent garantir une présence sans interruption à leur proche."
                }
              },
              {
                "@type": "Question",
                "name": "Suis-je engagé sur la durée ?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Non, aucun engagement. Vous achetez des minutes quand vous en avez besoin, c'est tout : pas de prélèvement mensuel, rien à résilier. La seule exception est la recharge automatique, si vous l'activez — et elle se désactive en deux clics."
                }
              },
              {
                "@type": "Question",
                "name": "Mon proche va-t-il comprendre qu'il parle à une IA ?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Oui, en toute transparence. Dès la première seconde du premier appel, Aicoute se présente comme une IA mandatée par vous. Cette honnêteté est au cœur de notre démarche — et la plupart de nos utilisateurs trouvent cela rassurant plutôt que dérangeant."
                }
              },
              {
                "@type": "Question",
                "name": "Mon proche peut-il refuser d'être appelé ?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Absolument et à tout moment. Pendant l'appel il lui suffit de le dire ; les appels suivants sont immédiatement suspendus et vous êtes informé·e. Le respect du consentement prime sur tout le reste."
                }
              },
              {
                "@type": "Question",
                "name": "Que devient l'enregistrement de l'appel après le résumé ?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "L'enregistrement audio brut est supprimé dans les 24 heures. Seule la transcription textuelle est conservée pendant 12 mois glissants, le temps utile à la continuité de la conversation. Vous pouvez tout effacer à la demande."
                }
              }
            ]
          }
        ]
      }
    </script>

    <!-- Umami analytics — vitrine UNIQUEMENT. On exclut le back-office (app.*)
         et le dev local (localhost / 127.0.0.1) pour ne pas polluer les stats.
         Même critère que isAppHost (App.tsx : hostname.startsWith('app.')). -->
    <script>
      (function () {
        var h = location.hostname;
        if (h.indexOf('app.') === 0 || h === 'localhost' || h === '127.0.0.1') return;
        var s = document.createElement('script');
        s.defer = true;
        s.src = 'https://cloud.umami.is/script.js';
        s.setAttribute('data-website-id', 'f5b5010e-d978-4b56-a1d6-577af8601561');
        document.head.appendChild(s);
      })();
    </script>
