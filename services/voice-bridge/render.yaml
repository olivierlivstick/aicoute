# Render Blueprint — voice-bridge MODECT
# Utilisable via "New → Blueprint" sur Render, ou en référence pour
# la configuration manuelle d'un Web Service.
services:
  - type: web
    name: modect-voice-bridge
    runtime: node
    region: frankfurt          # le plus proche de la France pour la latence Twilio
    plan: starter              # Free Tier dort après 15 min → indispo pour la démo
    rootDir: services/voice-bridge
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Les secrets ci-dessous DOIVENT être renseignés manuellement dans l'UI Render
      # (sync: false → pas de propagation automatique entre environnements)
      - key: OPENAI_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_NUMBER
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://www.modect.com,https://modect.com
      - key: MAX_CALL_SECONDS
        value: "120"
      - key: MAX_SCHEDULED_CALL_SECONDS
        value: "900"            # appels Modect : 15 min max (cf. CLAUDE.md)
      - key: SCHEDULED_RING_TIMEOUT
        value: "30"             # sonnerie max avant que Twilio raccroche → passe B no-answer prend le relais
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Auth interne Supabase ↔ voice-bridge pour les appels planifiés.
      # MÊME valeur que le secret MODECT_INTERNAL_TOKEN côté Supabase.
      # Si absent → endpoint /scheduled-call refusé en 503 (le service reste
      # utilisable pour la démo vitrine).
      - key: MODECT_INTERNAL_TOKEN
        sync: false
