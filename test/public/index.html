<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Realtime · Test conversation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --bg-elevated: #141414;
      --border: rgba(255,255,255,0.08);
      --text: #fafafa;
      --text-muted: #8a8a8a;
      --text-dim: #555;
      --accent: #d4a574;
      --accent-glow: rgba(212, 165, 116, 0.4);
      --user: #6b8aff;
      --ai: #d4a574;
      --red: #e85d5d;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 15px;
      overflow: hidden;
    }

    body {
      display: grid;
      grid-template-columns: 1fr 380px;
      height: 100vh;
    }

    .main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px;
      position: relative;
    }

    .header {
      position: absolute;
      top: 32px;
      left: 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .logo-text {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: 20px;
      letter-spacing: 0.3px;
    }

    .model-badge {
      position: absolute;
      top: 32px;
      right: 32px;
      font-size: 12px;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      letter-spacing: 0.5px;
    }

    .stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
      max-width: 480px;
      text-align: center;
    }

    .title {
      font-family: 'Instrument Serif', serif;
      font-size: 56px;
      line-height: 1.05;
      font-weight: 400;
      letter-spacing: -0.5px;
    }

    .title em {
      font-style: italic;
      color: var(--accent);
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.5;
      max-width: 360px;
    }

    .orb-container {
      position: relative;
      width: 280px;
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .orb {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #f5d4a0, #d4a574 40%, #8a6238 100%);
      box-shadow:
        0 0 60px var(--accent-glow),
        inset -20px -30px 60px rgba(0,0,0,0.3);
      transition: transform 0.15s ease-out, box-shadow 0.3s ease;
      position: relative;
    }

    .orb.idle {
      animation: breathe 4s ease-in-out infinite;
    }

    .orb.listening {
      background: radial-gradient(circle at 35% 30%, #a8c0ff, #6b8aff 40%, #2c4499 100%);
      box-shadow: 0 0 80px rgba(107, 138, 255, 0.5), inset -20px -30px 60px rgba(0,0,0,0.3);
    }

    .orb.speaking {
      box-shadow: 0 0 100px var(--accent-glow), inset -20px -30px 60px rgba(0,0,0,0.3);
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }

    canvas.viz {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .start-btn {
      background: var(--accent);
      color: #1a1a1a;
      border: none;
      padding: 16px 40px;
      border-radius: 100px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.2px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 8px 24px var(--accent-glow);
    }

    .start-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 32px var(--accent-glow);
    }

    .start-btn:active { transform: translateY(0); }

    .start-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .stop-btn {
      background: transparent;
      color: var(--red);
      border: 1px solid var(--red);
      padding: 16px 40px;
      border-radius: 100px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .stop-btn:hover {
      background: rgba(232, 93, 93, 0.1);
    }

    .status {
      font-size: 13px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      letter-spacing: 0.5px;
      min-height: 20px;
    }

    .status .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
      margin-right: 8px;
      vertical-align: middle;
    }

    .status.connected .dot { background: #4ade80; }
    .status.error .dot { background: var(--red); }

    .panel {
      background: var(--bg-elevated);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .panel-header {
      padding: 24px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .panel-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
    }

    .clear-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
    }

    .clear-btn:hover { color: var(--text); }

    .transcript {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .transcript::-webkit-scrollbar { width: 6px; }
    .transcript::-webkit-scrollbar-track { background: transparent; }
    .transcript::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .empty-state {
      color: var(--text-dim);
      font-size: 13px;
      text-align: center;
      margin-top: 40px;
      line-height: 1.6;
    }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 6px;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
    }

    .msg-label.user { color: var(--user); }
    .msg-label.ai { color: var(--ai); }

    .msg-text {
      color: var(--text);
      font-size: 14px;
      line-height: 1.55;
    }

    .msg.partial .msg-text {
      color: var(--text-muted);
      font-style: italic;
    }

    .meta {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      display: flex;
      justify-content: space-between;
    }

    @media (max-width: 900px) {
      body { grid-template-columns: 1fr; grid-template-rows: 1fr 280px; }
      .panel { border-left: none; border-top: 1px solid var(--border); height: auto; }
      .title { font-size: 40px; }
      .orb-container { width: 200px; height: 200px; }
      .orb { width: 130px; height: 130px; }
    }
  </style>
</head>
<body>

  <div class="main">
    <div class="header">
      <div class="logo-dot"></div>
      <div class="logo-text">Realtime Lab</div>
    </div>
    <div class="model-badge">gpt-realtime-2 · cedar</div>

    <div class="stage">
      <div class="orb-container">
        <div class="orb idle" id="orb"></div>
        <canvas class="viz" id="viz" width="280" height="280"></canvas>
      </div>

      <div>
        <h1 class="title">Parle, je <em>t'écoute</em>.</h1>
        <p class="subtitle" style="margin-top: 16px;">
          Clique sur le bouton, autorise ton micro, et lance la conversation. L'IA répond en français, en temps réel.
        </p>
      </div>

      <div class="controls">
        <button class="start-btn" id="startBtn">Démarrer la conversation</button>
        <div class="status" id="status"><span class="dot"></span>Inactif</div>
      </div>
    </div>
  </div>

  <aside class="panel">
    <div class="panel-header">
      <div class="panel-title">Transcript</div>
      <button class="clear-btn" id="clearBtn">Effacer</button>
    </div>
    <div class="transcript" id="transcript">
      <div class="empty-state">
        Le transcript de la conversation apparaîtra ici en direct.
      </div>
    </div>
    <div class="meta">
      <span id="metaTime">--:--</span>
      <span id="metaState">déconnecté</span>
    </div>
  </aside>

  <script>
    // ============================================================
    // État global
    // ============================================================
    let pc = null;
    let dc = null;
    let localStream = null;
    let audioEl = null;
    let audioCtx = null;
    let analyser = null;
    let vizAnimId = null;
    let timerInterval = null;
    let startedAt = null;

    const orb = document.getElementById('orb');
    const startBtn = document.getElementById('startBtn');
    const statusEl = document.getElementById('status');
    const transcript = document.getElementById('transcript');
    const clearBtn = document.getElementById('clearBtn');
    const metaTime = document.getElementById('metaTime');
    const metaState = document.getElementById('metaState');
    const canvas = document.getElementById('viz');
    const ctx = canvas.getContext('2d');

    // ============================================================
    // UI helpers
    // ============================================================
    function setStatus(text, cls = '') {
      statusEl.className = 'status ' + cls;
      statusEl.innerHTML = `<span class="dot"></span>${text}`;
    }

    function setOrbState(state) {
      orb.className = 'orb ' + state;
    }

    function clearTranscript() {
      transcript.innerHTML = '<div class="empty-state">Le transcript de la conversation apparaîtra ici en direct.</div>';
    }

    clearBtn.onclick = clearTranscript;

    const messages = new Map();

    function getOrCreateMessage(itemId, role) {
      if (messages.has(itemId)) return messages.get(itemId);

      const empty = transcript.querySelector('.empty-state');
      if (empty) empty.remove();

      const div = document.createElement('div');
      div.className = 'msg partial';
      div.innerHTML = `
        <div class="msg-label ${role}">${role === 'user' ? 'Toi' : 'IA'}</div>
        <div class="msg-text"></div>
      `;
      transcript.appendChild(div);
      transcript.scrollTop = transcript.scrollHeight;

      const entry = { div, textEl: div.querySelector('.msg-text'), role };
      messages.set(itemId, entry);
      return entry;
    }

    function updateMessage(itemId, role, text, done = false) {
      const m = getOrCreateMessage(itemId, role);
      m.textEl.textContent = text;
      if (done) m.div.classList.remove('partial');
      transcript.scrollTop = transcript.scrollHeight;
    }

    function startTimer() {
      startedAt = Date.now();
      timerInterval = setInterval(() => {
        const elapsed = Math.floor((Date.now() - startedAt) / 1000);
        const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
        const s = String(elapsed % 60).padStart(2, '0');
        metaTime.textContent = `${m}:${s}`;
      }, 500);
    }

    function stopTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = null;
    }

    function startViz(stream) {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const source = audioCtx.createMediaStreamSource(stream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 128;
      source.connect(analyser);

      const buf = new Uint8Array(analyser.frequencyBinCount);
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;

      function draw() {
        analyser.getByteFrequencyData(buf);
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const bars = 64;
        const avg = buf.reduce((a, b) => a + b, 0) / buf.length;

        for (let i = 0; i < bars; i++) {
          const angle = (i / bars) * Math.PI * 2 - Math.PI / 2;
          const v = buf[Math.floor(i * buf.length / bars)] / 255;
          const innerR = 105;
          const outerR = innerR + v * 35 + 2;

          ctx.beginPath();
          ctx.moveTo(cx + Math.cos(angle) * innerR, cy + Math.sin(angle) * innerR);
          ctx.lineTo(cx + Math.cos(angle) * outerR, cy + Math.sin(angle) * outerR);
          ctx.strokeStyle = `rgba(212, 165, 116, ${0.3 + v * 0.6})`;
          ctx.lineWidth = 2;
          ctx.stroke();
        }

        const scale = 1 + (avg / 255) * 0.08;
        orb.style.transform = `scale(${scale})`;

        vizAnimId = requestAnimationFrame(draw);
      }
      draw();
    }

    function stopViz() {
      if (vizAnimId) cancelAnimationFrame(vizAnimId);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      orb.style.transform = '';
    }

    // ============================================================
    // Connexion WebRTC à OpenAI Realtime (API GA)
    // ============================================================
    async function startSession() {
      try {
        startBtn.disabled = true;
        setStatus('Création de la session...', '');
        metaState.textContent = 'connexion';

        // 1. Récupérer l'ephemeral token depuis le backend
        const tokenRes = await fetch('/session');
        const sessionData = await tokenRes.json();
        console.log('[session data]', sessionData);

        if (!sessionData.value) {
          throw new Error('Pas de token renvoyé. Réponse : ' + JSON.stringify(sessionData));
        }
        const EPHEMERAL_KEY = sessionData.value;

        // 2. Setup WebRTC peer connection
        pc = new RTCPeerConnection();

        // 3. Element audio pour la voix de l'IA
        audioEl = document.createElement('audio');
        audioEl.autoplay = true;
        pc.ontrack = (e) => {
          audioEl.srcObject = e.streams[0];
          startViz(e.streams[0]);
        };

        // 4. Ajouter le micro
        setStatus('Accès au micro...', '');
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        pc.addTrack(localStream.getAudioTracks()[0], localStream);

        // 5. Data channel pour les events
        dc = pc.createDataChannel('oai-events');
        dc.onopen = () => {
          setStatus('Connecté · parle quand tu veux', 'connected');
          metaState.textContent = 'en cours';
          setOrbState('speaking');
          startBtn.textContent = 'Arrêter';
          startBtn.classList.remove('start-btn');
          startBtn.classList.add('stop-btn');
          startBtn.disabled = false;
          startBtn.onclick = stopSession;
          startTimer();

          // Demander la transcription des entrées + texte en sortie
          dc.send(JSON.stringify({
            type: 'session.update',
            session: {
              type: 'realtime',
              output_modalities: ['audio'],
              audio: {
                input: {
                  transcription: { model: 'whisper-1' }
                }
              }
            }
          }));
        };
        dc.onmessage = handleServerEvent;

        // 6. SDP offer/answer
        setStatus('Négociation WebRTC...', '');
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        const sdpRes = await fetch(`https://api.openai.com/v1/realtime/calls?model=gpt-realtime-2`, {
          method: 'POST',
          body: offer.sdp,
          headers: {
            Authorization: `Bearer ${EPHEMERAL_KEY}`,
            'Content-Type': 'application/sdp',
          },
        });

        const sdpText = await sdpRes.text();
        console.log('[SDP response status]', sdpRes.status);
        console.log('[SDP response body]', sdpText.substring(0, 500));

        if (!sdpRes.ok) {
          throw new Error('OpenAI a refusé la connexion : ' + sdpText);
        }

        const answer = { type: 'answer', sdp: sdpText };
        await pc.setRemoteDescription(answer);

      } catch (err) {
        console.error(err);
        setStatus('Erreur : ' + err.message, 'error');
        startBtn.disabled = false;
        stopSession();
      }
    }

    function stopSession() {
      stopTimer();
      stopViz();
      if (dc) dc.close();
      if (pc) pc.close();
      if (localStream) localStream.getTracks().forEach(t => t.stop());
      if (audioEl) audioEl.srcObject = null;
      pc = null; dc = null; localStream = null;

      setStatus('Inactif', '');
      metaState.textContent = 'déconnecté';
      setOrbState('idle');
      startBtn.textContent = 'Démarrer la conversation';
      startBtn.classList.remove('stop-btn');
      startBtn.classList.add('start-btn');
      startBtn.disabled = false;
      startBtn.onclick = startSession;
    }

    // ============================================================
    // Gestion des événements serveur
    // ============================================================
    function handleServerEvent(e) {
      const event = JSON.parse(e.data);

      // Décommente pour voir tous les events :
      // console.log('[event]', event.type, event);

      switch (event.type) {
        case 'conversation.item.input_audio_transcription.delta':
          if (event.item_id) {
            const m = getOrCreateMessage(event.item_id, 'user');
            m.textEl.textContent += event.delta || '';
          }
          break;
        case 'conversation.item.input_audio_transcription.completed':
          if (event.item_id) {
            updateMessage(event.item_id, 'user', event.transcript, true);
          }
          break;

        case 'response.output_audio_transcript.delta':
        case 'response.audio_transcript.delta':
          if (event.item_id) {
            const m = getOrCreateMessage(event.item_id, 'ai');
            m.textEl.textContent += event.delta || '';
            transcript.scrollTop = transcript.scrollHeight;
          }
          break;
        case 'response.output_audio_transcript.done':
        case 'response.audio_transcript.done':
          if (event.item_id) {
            updateMessage(event.item_id, 'ai', event.transcript, true);
          }
          break;

        case 'input_audio_buffer.speech_started':
          setOrbState('listening');
          setStatus('Je t\'écoute...', 'connected');
          break;
        case 'input_audio_buffer.speech_stopped':
          setOrbState('speaking');
          setStatus('Je réfléchis...', 'connected');
          break;
        case 'response.audio.done':
        case 'response.output_audio.done':
          setStatus('À toi', 'connected');
          break;

        case 'error':
          console.error('[realtime error]', event);
          setStatus('Erreur : ' + (event.error?.message || 'inconnue'), 'error');
          break;
      }
    }

    startBtn.onclick = startSession;
  </script>
</body>
</html>
