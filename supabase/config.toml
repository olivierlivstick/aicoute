[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323

[inbucket]
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://localhost:5173", "http://localhost:5173"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false   # mettre true en production

[auth.sms]
enable_signup = false

[functions.initiate-call]
verify_jwt = false   # auth gérée en interne via admin client

[functions.realtime-token]
verify_jwt = false   # auth gérée en interne via admin client

[functions.save-transcript]
verify_jwt = false   # auth gérée en interne via admin client

[functions.generate-summary]
verify_jwt = false   # appelée en interne (save-transcript, schedule-calls passe D, resend-report) avec la clé service-role. verify_jwt=true rejetait la service-role en 401 (la passerelle n'accepte que la clé anon / un JWT user) → compte-rendu + email perdus. Aucun appelant client direct.

[functions.schedule-calls]
verify_jwt = false   # appelé par le cron Supabase

[functions.public-realtime-token]
verify_jwt = false   # démo publique vitrine (www.modect.com), pas d'auth

[functions.log-demo]
verify_jwt = false   # appelée depuis la vitrine publique (DemoWebModal)

[functions.list-demos]
verify_jwt = false   # auth interne via ?key=<DEMO_TRACK_KEY>

[functions.get-call-context]
verify_jwt = false   # auth interne via MODECT_INTERNAL_TOKEN (appelée par le voice-bridge)

[functions.regenerate-future-calls]
verify_jwt = false   # appelée par le trigger SQL session_schedules + par le client back-office

[functions.resend-report]
verify_jwt = false   # auth gérée en interne via requireAdmin (JWT appelant)

[functions.get-report]
verify_jwt = false   # page publique de partage du compte-rendu (sans login) ; le report_token porté dans l'URL EST le secret (expire 48h)
